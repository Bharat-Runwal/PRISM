<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 95 36">
  <defs>
    <style>
      .ibm-bar { fill: #1F70C1; }
    </style>
  </defs>
  <!-- IBM 8-bar logo approximation -->
  <g class="ibm-bar">
    <!-- ═══ I ═══ -->
    <rect x="0" y="0" width="22" height="3.5"/>
    <rect x="0" y="5" width="22" height="3.5"/>
    <rect x="6" y="10" width="10" height="3.5"/>
    <rect x="6" y="15" width="10" height="3.5"/>
    <rect x="6" y="20" width="10" height="3.5"/>
    <rect x="6" y="25" width="10" height="3.5"/>
    <rect x="0" y="30" width="22" height="3.5"/>

    <!-- ═══ B ═══ -->
    <rect x="28" y="0" width="30" height="3.5"/>
    <rect x="28" y="5" width="30" height="3.5"/>
    <rect x="34" y="10" width="10" height="3.5"/>
    <rect x="50" y="10" width="8" height="3.5"/>
    <rect x="34" y="15" width="22" height="3.5"/>
    <rect x="34" y="20" width="10" height="3.5"/>
    <rect x="50" y="20" width="10" height="3.5"/>
    <rect x="28" y="25" width="32" height="3.5"/>
