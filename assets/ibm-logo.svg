    <rect x="76" y="10" width="4" height="3.5"/>
    <rect x="82" y="10" width="6" height="3.5"/>

    <rect x="68" y="15" width="6" height="3.5"/>
    <rect x="82" y="15" width="6" height="3.5"/>

    <rect x="68" y="20" width="6" height="3.5"/>
    <rect x="82" y="20" width="6" height="3.5"/>

    <rect x="68" y="25" width="6" height="3.5"/>
    <rect x="82" y="25" width="6" height="3.5"/>

